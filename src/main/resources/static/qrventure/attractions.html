<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intramuros Attractions | QRventure</title>
  <link rel="stylesheet" href="/qrventure/css/styles.css">
</head>
<body>
<div data-public-header data-header-title="Attractions" data-back-fallback="/qrventure/"></div>
<main class="container">
  <section class="hero section">
    <div class="hero-eyebrow">Landmarks & Heritage</div>
    <h1>Attractions in Intramuros</h1>
    <p>Browse curated stops around Fort Santiago, San Agustin Church, Casa Manila, Manila Cathedral, and more historic sites.</p>
    <form class="search-row" method="get">
      <input class="input" name="q" placeholder="Search by name or keyword">
      <select class="select" name="category">
        <option value="">All categories</option>
        <option>Historical Site</option>
        <option>Museum</option>
        <option>Religious Heritage</option>
      </select>
      <button class="btn btn-primary">Apply</button>
    </form>
  </section>
  <section class="section"><div id="items"></div></section>
</main>
<footer class="footer"><div class="container">Explore more: routes, dining, and services in Intramuros.</div></footer>
<script src="/qrventure/js/public-header.js"></script>
<script src="/qrventure/js/api.js"></script>
<script src="/qrventure/js/listing.js"></script>
<script>loadListing({target:'#items',endpoint:'/api/attractions',type:'attractions',empty:'No attractions found for your filters.',filters:[{url:'q',api:'q'},{url:'category',api:'category'}]})</script>
</body>
</html>
