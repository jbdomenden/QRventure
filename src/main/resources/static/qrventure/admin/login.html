<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | QRventure</title>
  <link rel="stylesheet" href="/qrventure/css/styles.css" />
  <style>
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px 0; }
    .auth-card { width: min(460px, 100%); background: var(--bg-surface); border: 1px solid var(--line); border-radius: var(--radius-md); padding: var(--space-5); box-shadow: 0 8px 24px rgba(20,20,19,.06); }
    .auth-card h1 { margin-top: 0; margin-bottom: var(--space-2); }
    .auth-form { display: grid; gap: var(--space-3); margin-top: var(--space-4); }
    .auth-feedback { min-height: 24px; font-size: .95rem; }
  </style>
</head>
<body>
  <main class="container auth-wrap">
    <section class="auth-card">
      <h1>QRventure Admin</h1>
      <p class="meta">Sign in to manage Intramuros tourism content.</p>

      <form id="loginForm" class="auth-form">
        <label>
          Username
          <input class="input" id="username" name="username" autocomplete="username" required />
        </label>
        <label>
          Password
          <input class="input" id="password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <button class="btn btn-primary" id="loginSubmit" type="submit">Log in</button>
      </form>
      <p class="auth-feedback" id="feedback" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="/qrventure/js/admin-login.js"></script>
</body>
</html>
